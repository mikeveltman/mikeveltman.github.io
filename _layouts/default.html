<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Apply saved theme before render to prevent flash -->
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <!-- Open Graph / social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  {% if page.cover %}<meta property="og:image" content="{{ site.url }}{{ page.cover }}">{% elsif site.og_image %}<meta property="og:image" content="{{ site.url }}{{ site.og_image }}">{% endif %}
  <link rel="icon" href="{{ site.baseurl }}/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400;1,9..144,700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/styles.css">
  {% feed_meta %}
</head>
<body{% if page.url == "/" %} class="home"{% endif %}>
  {% include header.html %}
  <main>{{ content }}</main>
  {% include footer.html %}
  <script>
  (function(){
    var btn=document.getElementById('theme-toggle');
    if(!btn)return;
    btn.addEventListener('click',function(){
      var root=document.documentElement;
      var isDark=root.getAttribute('data-theme')==='dark'||
        (!root.getAttribute('data-theme')&&window.matchMedia('(prefers-color-scheme: dark)').matches);
      var next=isDark?'light':'dark';
      root.setAttribute('data-theme',next);
      localStorage.setItem('theme',next);
    });
  })();
  </script>
</body>
</html>
